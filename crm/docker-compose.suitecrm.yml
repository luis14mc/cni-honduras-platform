# SuiteCRM stack — independent from the main cni-honduras-platform docker-compose.
# Usage (from crm/):
#   cp .env.example .env
#   docker compose -f docker-compose.suitecrm.yml up -d
#
# SuiteCRM 8+ DocumentRoot: /var/www/html/public (see apache/vhost.conf)

services:
  suitecrm-db:
    image: mariadb:10.11
    container_name: cni-suitecrm-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ${SUITECRM_DB_NAME}
      MARIADB_USER: ${SUITECRM_DB_USER}
      MARIADB_PASSWORD: ${SUITECRM_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${SUITECRM_DB_ROOT_PASSWORD}
    ports:
      - "${SUITECRM_DB_PORT}:3306"
    volumes:
      - ./mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  suitecrm-app:
    # Temporary base image for local development.
    # Replace with an official SuiteCRM image when one is adopted for production.
    image: php:8.2-apache
    container_name: cni-suitecrm-app
    restart: unless-stopped
    depends_on:
      suitecrm-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SUITECRM_DOMAIN: ${SUITECRM_DOMAIN}
    ports:
      - "${SUITECRM_PORT}:80"
    volumes:
      # SuiteCRM 8+ source (local only, gitignored)
      - ./suitecrm:/var/www/html
      # Apache vhost template; SUITECRM_DOMAIN substituted at container start
      - ./apache/vhost.conf:/etc/apache2/sites-available/000-default.conf.template:ro
    command:
      - bash
      - -c
      - |
        sed 's/$${SUITECRM_DOMAIN}/'"$${SUITECRM_DOMAIN}"'/g' \
          /etc/apache2/sites-available/000-default.conf.template \
          > /etc/apache2/sites-available/000-default.conf
        a2enmod rewrite
        exec apache2-foreground
